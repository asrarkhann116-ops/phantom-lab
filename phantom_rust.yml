name: Phantom-RustDesk-VPS
on:
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Prep System
        run: |
          sudo apt-get update > /dev/null
          sudo apt-get install -y xfce4 xfce4-goodies curl jq > /dev/null

      - name: Install RustDesk
        run: |
          wget https://github.com/rustdesk/rustdesk/releases/download/1.2.3/rustdesk-1.2.3-x86_64.deb
          sudo apt-get install -y ./rustdesk-1.2.3-x86_64.deb > /dev/null

      - name: Launch Phantom Desktop
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: "1104652354655113268"
        run: |
          # Start Xvfb (Virtual Display)
          sudo apt-get install -y xvfb > /dev/null
          Xvfb :1 -screen 0 1280x720x24 &
          export DISPLAY=:1
          
          # Start Desktop
          startxfce4 &
          
          # Start RustDesk and Set Password
          sudo rustdesk --password phantom786 &
          sleep 10
          
          # Get RustDesk ID
          RUST_ID=$(rustdesk --get-id)
          
          echo "ID: $RUST_ID"

          # Notify Discord
          CHANNEL_ID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"recipient_id\": \"$USER_ID\"}" https://discord.com/api/v10/users/@me/channels | jq -r '.id')
          
          curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"content\": \"🛰️ **Phantom RustDesk VPS Online!**\n\n🆔 **ID:** \`$RUST_ID\`\n🔑 **Pass:** \`phantom786\`\n\n🛠️ **How to connect:**\n1. Download RustDesk on your PC.\n2. Enter the ID and use the password.\n\n*Zero lag, Zero console errors!*\"}" https://discord.com/api/v10/channels/$CHANNEL_ID/messages

          while true; do sleep 300; done
