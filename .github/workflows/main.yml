name: Phantom-CF-Shell
on:
  workflow_dispatch:

jobs:
  pwn:
    runs-on: ubuntu-latest
    steps:
      - name: Prep Environment
        run: |
          sudo apt-get update > /dev/null
          sudo apt-get install -y ttyd jq curl > /dev/null

      - name: Deploy Cloudflare Tunnel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: "1104652354655113268"
        run: |
          # 1. Install Cloudflared (Latest)
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb > /dev/null
          
          # 2. Start ttyd (Terminal over Web) on Port 8080
          # Password set kar raha hoon: operator / phantom786
          ttyd -p 8080 -c operator:phantom786 bash &
          
          echo "Waiting for Web Shell to start..."
          sleep 5
          
          # 3. Start Cloudflare Tunnel (Quick Tunnel - No Account Needed)
          nohup cloudflared tunnel --url http://localhost:8080 > cf.log 2>&1 &
          
          echo "Generating Tunnel Link..."
          sleep 15
          
          # 4. Extract Tunnel URL from logs
          CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf.log | head -n 1)
          
          if [ -z "$CF_URL" ]; then
            echo "Cloudflare failed to generate link. Retrying..."
            sleep 10
            CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf.log | head -n 1)
          fi

          echo "Web Shell URL: $CF_URL"

          # 5. Notify Discord
          CHANNEL_ID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"recipient_id\": \"$USER_ID\"}" https://discord.com/api/v10/users/@me/channels | jq -r '.id')
          
          if [ "$CHANNEL_ID" != "null" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"content\": \"馃寪 **Phantom Web VPS Online!**\n\n馃敆 **Link:** $CF_URL\n馃懁 **User:** \`operator\`\n馃攽 **Pass:** \`phantom786\`\n\n鈴憋笍 *Stability: 100% | No 503 guaranteed.*\"}" https://discord.com/api/v10/channels/$CHANNEL_ID/messages
            echo "Notification sent!"
          else
            echo "Discord notification failed."
          fi

          # Keep the session alive for 6 hours
          echo "VPS is running. Check Discord for link."
          for i in {1..360}; do
            echo "Heartbeat: $(date) - Tunnel Active"
            sleep 60
          done
