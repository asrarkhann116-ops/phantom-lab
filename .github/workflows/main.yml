name: Phantom-v2-VPS
on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:      

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Stealth Prep
        run: |
          sudo apt-get update -y > /dev/null
          sudo apt-get install tmate jq curl -y > /dev/null

      - name: Weaponize & Launch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: "1104652354655113268"
        run: |
          # Start tmate in background with custom socket
          tmate -S /tmp/tmate.sock new-session -d
          
          echo "Waiting for tmate to establish connection..."
          
          # Improved loop to wait for links (Max 60s)
          iteration=0
          while true; do
            SSH_LINK=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
            WEB_LINK=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
            
            if [[ -n "$SSH_LINK" && "$SSH_LINK" != *"..."* ]]; then
              echo "Links generated successfully!"
              break
            fi
            
            if [ $iteration -gt 30 ]; then
              echo "Timeout: Failed to get links."
              exit 1
            fi
            
            echo "Waiting... ($iteration)"
            sleep 2
            iteration=$((iteration+1))
          done

          echo "SSH: $SSH_LINK"
          echo "WEB: $WEB_LINK"

          # Get DM Channel
          CHANNEL_ID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" \
               -H "Content-Type: application/json" \
               -X POST \
               -d "{\"recipient_id\": \"$USER_ID\"}" \
               https://discord.com/api/v10/users/@me/channels | jq -r '.id')

          if [ "$CHANNEL_ID" != "null" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" \
                 -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"💀 **Phantom v2 VPS Active!**\n\n👤 **Operator:** <@$USER_ID>\n🔗 **SSH:** \`$SSH_LINK\`\n🌐 **Web Shell:** $WEB_LINK\n\n⚠️ *Auto-kill in 6 hours.*\"}" \
                 https://discord.com/api/v10/channels/$CHANNEL_ID/messages
            echo "Notification dispatched."
          else
            echo "Failed to open DM. Token ya User ID check kar."
          fi

          # Anti-Idle Heartbeat (Keep job alive for 6 hours)
          echo "VPS is live. Holding session..."
          for i in {1..360}; do
            echo "Heartbeat: $(date) - Session Active"
            sleep 60
          done
