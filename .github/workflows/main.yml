name: Phantom-RDP-Nitro
on:
  workflow_dispatch:

jobs:
  launch-rdp:
    runs-on: ubuntu-latest
    steps:
      - name: Nitro Prep (XFCE + RDP)
        run: |
          sudo apt-get update > /dev/null
          # Core components install
          sudo apt-get install -y xfce4 xfce4-goodies xrdp xorgxrdp curl jq > /dev/null
          
          # XRDP & Session Fixes (Crucial for avoiding 'Console Session' error)
          sudo adduser xrdp ssl-cert
          echo "exec startxfce4" > ~/.xsession
          chmod +x ~/.xsession
          
          # Allow anybody to start X server (Fixes RDP login issues)
          sudo sed -i 's/allowed_users=console/allowed_users=anybody/' /etc/X11/Xwrapper.config
          
          # Credentials
          echo "runner:phantom786" | sudo chpasswd
          
          # Restart XRDP
          sudo /etc/init.d/xrdp restart

      - name: Launch Cloudflare Nitro Tunnel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: "1104652354655113268"
        run: |
          # Download Cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb > /dev/null
          
          # Start Tunnel for RDP
          nohup cloudflared tunnel --url rdp://localhost:3389 > cf.log 2>&1 &
          
          echo "Igniting the tunnel..."
          sleep 20
          
          # Extract Tunnel Hostname
          CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf.log | head -n 1)
          TUNNEL_HOST=${CF_URL#https://}
          
          echo "Host: $TUNNEL_HOST"

          # Discord Notification
          CHANNEL_ID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"recipient_id\": \"$USER_ID\"}" https://discord.com/api/v10/users/@me/channels | jq -r '.id')
          
          if [ "$CHANNEL_ID" != "null" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"content\": \"🚀 **Phantom RDP Nitro v2 (Fixed) Active!**\n\n👤 **User:** \`runner\`\n🔑 **Pass:** \`phantom786\`\n🔗 **Hostname:** \`$TUNNEL_HOST\`\n\n🛠️ **Connection Steps:**\n1. Run: \`cloudflared access rdp --hostname $TUNNEL_HOST --listener localhost:3389\`\n2. Open Remote Desktop Connection to \`localhost:3389\`\"}" https://discord.com/api/v10/channels/$CHANNEL_ID/messages
            echo "Notification sent."
          else
            echo "Discord error."
          fi

          # Heartbeat (6 Hours)
          while true; do echo "Nitro Session Active - $(date)"; sleep 300; done
