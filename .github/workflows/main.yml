name: Phantom-RDP-Nitro
on:
  workflow_dispatch:

jobs:
  launch-rdp:
    runs-on: ubuntu-latest
    steps:
      - name: Nitro Prep (XFCE + RDP)
        run: |
          sudo apt-get update > /dev/null
          # Desktop, RDP aur basic tools install kar rahe hain
          sudo apt-get install -y xfce4 xfce4-goodies xrdp curl jq > /dev/null
          
          # XRDP Configuration
          sudo adduser xrdp ssl-cert
          echo "xfce4-session" > ~/.xsession
          echo "runner:phantom786" | sudo chpasswd
          sudo /etc/init.d/xrdp start

      - name: Launch Cloudflare Nitro Tunnel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: "1104652354655113268"
        run: |
          # Download Cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb > /dev/null
          
          # Start Tunnel for RDP (Port 3389)
          nohup cloudflared tunnel --url rdp://localhost:3389 > cf.log 2>&1 &
          
          echo "Waiting for tunnel to ignite..."
          sleep 20
          
          # Extract Tunnel Hostname
          CF_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' cf.log | head -n 1)
          TUNNEL_HOST=${CF_URL#https://}
          
          echo "Host: $TUNNEL_HOST"

          # Discord Notification
          CHANNEL_ID=$(curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"recipient_id\": \"$USER_ID\"}" https://discord.com/api/v10/users/@me/channels | jq -r '.id')
          
          if [ "$CHANNEL_ID" != "null" ]; then
            curl -s -H "Authorization: Bot $DISCORD_TOKEN" -H "Content-Type: application/json" -X POST -d "{\"content\": \"🚀 **Phantom RDP Nitro Active!**\n\n👤 **User:** \`runner\`\n🔑 **Pass:** \`phantom786\`\n🔗 **Hostname:** \`$TUNNEL_HOST\`\n\n🛠️ **How to connect:**\n1. Run this on your PC: \`cloudflared access rdp --hostname $TUNNEL_HOST --listener localhost:3389\`\n2. Open 'Remote Desktop Connection' app.\n3. Connect to \`localhost:3389\`\"}" https://discord.com/api/v10/channels/$CHANNEL_ID/messages
            echo "Notification dispatched."
          else
            echo "Discord error."
          fi

          # Heartbeat (Stay alive for 6 hours)
          while true; do echo "Nitro Session Active - $(date)"; sleep 300; done
