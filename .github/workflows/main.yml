name: Phantom-24-7-VPS
on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein auto-restart
  workflow_dispatch:      # Manual trigger ke liye

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Machine
        run: |
          sudo apt-get update
          sudo apt-get install tmate jq curl -y

      - name: Launch & Notify
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          USER_ID: "1104652354655113268"
        run: |
          # Start tmate in background with a fixed socket
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait-for-session
          
          # Extract links
          SSH_LINK=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          WEB_LINK=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
          
          echo "SSH: $SSH_LINK"
          echo "WEB: $WEB_LINK"

          # Send to Discord via Bot
          # Note: Hum direct API call karenge bina kisi library ke
          curl -H "Authorization: Bot $DISCORD_TOKEN" \
               -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"🚀 **Phantom VPS Online!**\n\n👤 **Operator:** <@$USER_ID>\n🔗 **SSH:** \`$SSH_LINK\`\n🌐 **Web Shell:** $WEB_LINK\n\n⏱️ *Session limit: 6 Hours*\"}" \
               https://discord.com/api/v10/channels/$(curl -H "Authorization: Bot $DISCORD_TOKEN" https://discord.com/api/v10/users/@me/channels -X POST -d "{\"recipient_id\": \"$USER_ID\"}" | jq -r '.id')/messages

          # Keep the VPS alive for 6 hours
          echo "VPS is running... Keeping session alive for 6 hours."
          sleep 21600
